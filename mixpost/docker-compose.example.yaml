# Exemple Docker Compose (spec Compose / `docker compose` v2+).
# Référence officielle : https://docs.mixpost.app/lite/installation/docker
#
# Préparation :
#   cp env.example .env
#   mkdir -p secrets
#   echo "votre_mot_de_passe_mysql" > secrets/db_password.txt
#   echo "base64:..." > secrets/app_key.txt   # https://mixpost.app/tools/encryption-key-generator
# Le mot de passe dans .env (MYSQL_PASSWORD) doit être identique au contenu de secrets/db_password.txt
# pour que l’instance MySQL et Mixpost correspondent.
#
# Démarrage : docker compose -f docker-compose.example.yaml --env-file .env up -d

services:
  mixpost:
    image: donkeycode/mixpost:latest
    env_file:
      - .env
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      APP_URL: ${APP_URL:-http://localhost:9000}
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: ${MYSQL_DATABASE:-mixpost}
      DB_USERNAME: ${MYSQL_USER:-mixpost}
      DB_PASSWORD_SECRET_FILE: /run/secrets/db_password
      APP_KEY_SECRET_FILE: /run/secrets/app_key
      REDIS_HOST: redis
    secrets:
      - db_password
      - app_key
    ports:
      - "${MIXPOST_HTTP_PORT:-9000}:80"
    volumes:
      - mixpost_storage:/var/www/html/storage/app
      - mixpost_logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql/mysql-server:8.0
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mixpost}
      MYSQL_USER: ${MYSQL_USER:-mixpost}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Définir MYSQL_PASSWORD dans .env}
    volumes:
      - mixpost_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p\"$$MYSQL_PASSWORD\" || exit 1"]
      retries: 3
      timeout: 5s
      interval: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - mixpost_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s
    restart: unless-stopped

secrets:
  db_password:
    file: ./secrets/db_password.txt
  app_key:
    file: ./secrets/app_key.txt

volumes:
  mixpost_storage:
  mixpost_logs:
  mixpost_mysql:
  mixpost_redis:
